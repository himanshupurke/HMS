<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | HMS SaaS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed": "#001f26",
                    "on-secondary-container": "#006374",
                    "on-tertiary-fixed-variant": "#812800",
                    "on-primary-fixed-variant": "#0040a2",
                    "on-secondary-fixed-variant": "#004e5d",
                    "on-primary": "#ffffff",
                    "surface-bright": "#f8fafb",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#0c56d0",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#2e3132",
                    "tertiary-fixed": "#ffdbcf",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#b2c5ff",
                    "surface-container-low": "#f2f4f5",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-tertiary-container": "#ffc6b2",
                    "tertiary": "#7b2600",
                    "secondary-container": "#6ae1ff",
                    "surface-container": "#eceeef",
                    "secondary-fixed": "#adecff",
                    "primary-container": "#0052cc",
                    "surface-container-high": "#e6e8e9",
                    "on-surface": "#191c1d",
                    "tertiary-container": "#a33500",
                    "on-surface-variant": "#434654",
                    "surface": "#f8fafb",
                    "surface-variant": "#e1e3e4",
                    "outline-variant": "#c3c6d6",
                    "surface-container-highest": "#e1e3e4",
                    "primary": "#003d9b",
                    "tertiary-fixed-dim": "#ffb59b",
                    "on-primary-fixed": "#001848",
                    "on-error": "#ffffff",
                    "primary-fixed": "#dae2ff",
                    "inverse-on-surface": "#eff1f2",
                    "background": "#f8fafb",
                    "on-tertiary-fixed": "#380d00",
                    "inverse-primary": "#b2c5ff",
                    "on-primary-container": "#c4d2ff",
                    "outline": "#737685",
                    "surface-dim": "#d8dadb",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed-dim": "#5dd6f3",
                    "secondary": "#00687a",
                    "on-background": "#191c1d"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #0052cc 0%, #003d9b 100%);
        }
        .medical-pattern {
            background-image: radial-gradient(#c3c6d6 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.2;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
<div class="absolute inset-0 medical-pattern pointer-events-none"></div>

<div class="max-w-xl w-full space-y-8 bg-surface-container-lowest p-10 rounded-2xl shadow-xl relative z-10 border border-outline-variant/10">
    <div class="flex flex-col items-center">
        <div class="w-12 h-12 signature-gradient rounded-xl flex items-center justify-center mb-4">
            <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
        </div>
        <h2 class="text-3xl font-extrabold text-primary tracking-tight">Staff Registration</h2>
        <p class="mt-2 text-sm text-outline font-medium">Join City General Hospital's medical team.</p>
    </div>

    <form class="mt-8 space-y-5" id="signupForm">
        <div class="space-y-4">
<!-- Hospital name removed for single-hospital model -->

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label for="firstName" class="text-xs font-bold text-on-background uppercase tracking-widest">First Name</label>
                    <input id="firstName" name="firstName" type="text" required class="appearance-none rounded-lg relative block w-full px-4 h-12 border-outline-variant/20 bg-surface-container-low text-on-background focus:ring-primary focus:border-primary focus:z-10 sm:text-sm outline-none border transition-all" placeholder="John">
                </div>
                <div class="space-y-1">
                    <label for="lastName" class="text-xs font-bold text-on-background uppercase tracking-widest">Last Name</label>
                    <input id="lastName" name="lastName" type="text" required class="appearance-none rounded-lg relative block w-full px-4 h-12 border-outline-variant/20 bg-surface-container-low text-on-background focus:ring-primary focus:border-primary focus:z-10 sm:text-sm outline-none border transition-all" placeholder="Doe">
                </div>
            </div>

            <div class="space-y-1">
                <label for="email-address" class="text-xs font-bold text-on-background uppercase tracking-widest">Email Address</label>
                <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none rounded-lg relative block w-full px-4 h-12 border-outline-variant/20 bg-surface-container-low text-on-background focus:ring-primary focus:border-primary focus:z-10 sm:text-sm outline-none border transition-all" placeholder="admin@hospital.com">
            </div>

            <div class="space-y-1">
                <label for="password" class="text-xs font-bold text-on-background uppercase tracking-widest">Password</label>
                <input id="password" name="password" type="password" required class="appearance-none rounded-lg relative block w-full px-4 h-12 border-outline-variant/20 bg-surface-container-low text-on-background focus:ring-primary focus:border-primary focus:z-10 sm:text-sm outline-none border transition-all" placeholder="••••••••">
            </div>
        </div>

        <div class="flex items-center">
            <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 text-primary focus:ring-primary border-outline-variant/30 rounded cursor-pointer">
            <label for="terms" class="ml-2 block text-xs text-outline font-medium">
                I agree to the <a href="#" class="text-primary hover:text-secondary font-bold">Terms of Service</a> and <a href="#" class="text-primary hover:text-secondary font-bold">Privacy Policy</a>
            </label>
        </div>

        <div>
            <button type="submit" class="group relative w-full h-12 flex justify-center items-center px-4 border border-transparent text-sm font-bold rounded-xl text-white signature-gradient shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                    <span class="material-symbols-outlined text-white/50 group-hover:text-white transition-colors">how_to_reg</span>
                </span>
                Create Account
            </button>
        </div>
    </form>

    <div class="mt-6 text-center">
        <p class="text-sm text-outline font-medium">
            Already have an account? 
            <a href="login.html" class="text-primary hover:text-secondary font-extrabold transition-colors">Sign In</a>
        </p>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/api.js"></script>
<script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = this.querySelector('button[type="submit"]');
        const formData = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email-address').value,
            password: document.getElementById('password').value
        };

        // Remove old error
        const oldErr = document.getElementById('signup-error');
        if (oldErr) oldErr.remove();

        btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-lg">progress_activity</span> Setting up sanctuary...';
        btn.disabled = true;

        try {
            await HMS.signup(formData);
            window.location.href = 'dashboard.html';
        } catch (err) {
            const div = document.createElement('div');
            div.id = 'signup-error';
            div.className = 'mt-4 flex items-center gap-2 p-3 bg-error-container text-on-error-container rounded-lg text-sm font-medium';
            div.innerHTML = '<span class="material-symbols-outlined text-lg">error</span>' + (err.message || 'Signup failed. Please try again.');
            this.prepend(div);
            
            btn.innerHTML = 'Create Account';
            btn.disabled = false;
        }
    });
</script>
</body></html>
